name: gateway-image

# Builds and publishes the deny-first nftables gateway image to ghcr.io on
# every push to master, then signs it best-effort with keyless sigstore
# (continue-on-error, mirroring the host-binary signing in release.yml).
# dproxy doctor resolves :latest to a digest for the host platform, pulls it,
# and pins it in the user configuration — so a plain `go install` user gets a
# working gateway without building from source. Digest-pinning is the
# mandatory guarantee; the signature is defense-in-depth.

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # for cosign keyless signing of the published image
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/i-rocky/dproxy-gateway:latest
            ghcr.io/i-rocky/dproxy-gateway:${{ github.sha }}
      # Best-effort keyless sigstore signature over the pushed manifest digest,
      # mirroring the host-binary signing in release.yml. continue-on-error so a
      # signing-infrastructure outage cannot block the publish; digest-pinning
      # (enforced by doctor) remains the mandatory guarantee.
      - uses: sigstore/cosign-installer@v3
      - name: sign gateway image (keyless sigstore)
        continue-on-error: true
        run: cosign sign --yes ghcr.io/i-rocky/dproxy-gateway@${{ steps.build.outputs.digest }}
