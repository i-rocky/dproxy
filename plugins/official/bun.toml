schema = 1
name = "bun"
bins = ["bun", "bunx"]
commands = { bun = ["bun"], bunx = ["bunx"] }
[images.default]
repository = "docker.io/oven/bun"
tag_template = "{version}"
[[caches]]
path = "/home/bun/.bun/install/cache"
compatibility = "major"
[[egress]]
host = "registry.npmjs.org"
ports = [443]
[[platforms]]
os = "linux"
arch = "amd64"
