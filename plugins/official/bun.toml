schema = 1
name = "bun"
bins = ["bun", "bunx"]
commands = { bun = ["bun"], bunx = ["bunx"] }
environment = { BUN_INSTALL = "/var/dproxy/bun" }
[images.default]
repository = "docker.io/oven/bun"
tag_template = "{version}"
[[caches]]
path = "/var/dproxy/bun"
compatibility = "major"
[[egress]]
host = "registry.npmjs.org"
ports = [443]
[[platforms]]
os = "linux"
arch = "amd64"

[[platforms]]
os = "linux"
arch = "arm64"
