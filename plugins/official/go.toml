schema = 1
name = "go"
bins = ["go", "gofmt"]
commands = { go = ["go"], gofmt = ["gofmt"] }
[images.default]
repository = "docker.io/library/golang"
tag_template = "{version}"
[[caches]]
path = "/go/pkg/mod"
compatibility = "minor"
[[egress]]
host = "proxy.golang.org"
ports = [443]
[[egress]]
host = "sum.golang.org"
ports = [443]
[[platforms]]
os = "linux"
arch = "amd64"

[[platforms]]
os = "linux"
arch = "arm64"
