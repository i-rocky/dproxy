schema = 1
name = "go"
bins = ["go", "gofmt"]
commands = { go = ["go"], gofmt = ["gofmt"] }
environment = { GOPATH = "/var/dproxy/go" }
[images.default]
repository = "docker.io/library/golang"
tag_template = "{version}"
[[caches]]
path = "/var/dproxy/go"
compatibility = "minor"
[[egress]]
host = "proxy.golang.org"
ports = [443]
[[egress]]
host = "sum.golang.org"
ports = [443]
[[platforms]]
os = "linux"
arch = "amd64"

[[platforms]]
os = "linux"
arch = "arm64"
