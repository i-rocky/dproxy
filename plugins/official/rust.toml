schema = 1
name = "rust"
bins = ["cargo", "rustc", "rustfmt"]
commands = { cargo = ["cargo"], rustc = ["rustc"], rustfmt = ["rustfmt"] }
environment = { CARGO_HOME = "/var/dproxy/cargo" }
[images.default]
repository = "docker.io/library/rust"
tag_template = "{version}"
[[caches]]
path = "/var/dproxy/cargo"
compatibility = "minor"
[[egress]]
host = "index.crates.io"
ports = [443]
[[egress]]
host = "static.crates.io"
ports = [443]
[[egress]]
host = "crates.io"
ports = [443]
[[egress]]
host = "static.rust-lang.org"
ports = [443]
[[platforms]]
os = "linux"
arch = "amd64"

[[platforms]]
os = "linux"
arch = "arm64"
